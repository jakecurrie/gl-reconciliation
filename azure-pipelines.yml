trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  terraformVersion: "1.7.5"
  sonarProjectKey: "gl-rec-api"
  # Set these in Azure DevOps pipeline variables (not here — no secrets in YAML)
  # SONARCLOUD_ORG        — your SonarCloud organization key
  # ACR_SERVICE_CONNECTION — Azure DevOps service connection name for ACR
  # AZURE_SUBSCRIPTION    — Azure DevOps service connection name for the subscription

stages:
  # ── Infra ─────────────────────────────────────────────────────────────────────
  - stage: InfraValidate
    displayName: "Infra — Validate Terraform"
    jobs:
      - job: Validate
        displayName: "fmt + validate"
        pool:
          name: Default
        steps:
          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
              unzip -q terraform_$(terraformVersion)_linux_amd64.zip -d /tmp/tf
              sudo mv /tmp/tf/terraform /usr/local/bin/
            displayName: "Install Terraform $(terraformVersion)"

          - script: terraform fmt -check -recursive
            workingDirectory: infra
            displayName: "terraform fmt -check"

          - script: terraform init -backend=false
            workingDirectory: infra
            displayName: "terraform init (no backend)"

          - script: terraform validate
            workingDirectory: infra
            displayName: "terraform validate"

  # ── API ───────────────────────────────────────────────────────────────────────
  - stage: BuildAPI
    displayName: "API — Build, Test & Analyse"
    dependsOn: InfraValidate
    jobs:
      - job: Build
        pool:
          name: Default
        steps:
          - task: SonarCloudPrepare@4
            displayName: "SonarCloud — prepare"
            inputs:
              SonarCloud: "sonarcloud"
              organization: "$(SONARCLOUD_ORG)"
              scannerMode: dotnet
              projectKey: "$(sonarProjectKey)"
              projectName: "GL Reconciliation API"
              extraProperties: |
                sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/**/coverage.opencover.xml
                sonar.exclusions=infra/**,**/*.tf

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: "api/**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: "api/**/*.csproj"
              arguments: "--configuration Release --no-restore"

          - task: DotNetCoreCLI@2
            displayName: Test
            inputs:
              command: test
              projects: "api/**/*.Tests.csproj"
              arguments: >
                --configuration Release
                --no-build
                --collect:"XPlat Code Coverage"
                --settings api/coverlet.runsettings
              publishTestResults: true

          - task: SonarCloudAnalyze@4
            displayName: "SonarCloud — analyse"

          - task: SonarCloudPublish@4
            displayName: "SonarCloud — publish"
            inputs:
              pollingTimeoutSec: "300"

          - script: |
              GATE=$(curl -sf -u "$(SONARCLOUD_TOKEN):" \
                "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$(sonarProjectKey)" \
                | jq -r '.projectStatus.status')
              echo "Quality gate status: $GATE"
              [ "$GATE" = "OK" ] && exit 0 || exit 1
            displayName: "SonarCloud — enforce quality gate"

          - task: Docker@2
            displayName: "Build & push API image"
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            inputs:
              containerRegistry: "$(ACR_SERVICE_CONNECTION)"
              repository: "glrec-api"
              command: buildAndPush
              dockerfile: "api/Dockerfile"
              context: "api"
              tags: |
                $(Build.BuildId)
                latest

